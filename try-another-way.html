<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Try Another Way - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="try-another-way.css">
</head>
<body>
    <div class="container">
        <h1>Try Another Way</h1>
        
        <div class="login-option">
            <button class="email-btn"><i class="fas fa-envelope"></i> Sign in with Email</button>
        </div>
        
        <div class="login-option">
            <button class="phone-btn"><i class="fas fa-phone"></i> Sign in with Phone</button>
        </div>
        
        <div class="divider">OR</div>
        
        <div class="login-option">
            <button class="social-btn"><i class="fab fa-google"></i> Sign in with Google</button>
        </div>
        
        <div class="login-option">
            <button class="social-btn"><i class="fab fa-facebook"></i> Sign in with Facebook</button>
        </div>
        
        <div class="login-option">
            <button class="social-btn"><i class="fab fa-apple"></i> Sign in with Apple</button>
        </div>
        
        <div class="back-link">
            <a href="log in.html"><i class="fas fa-arrow-left"></i> Back to login</a>
        </div>
    </div>
</body>
</html>
