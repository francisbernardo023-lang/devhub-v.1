<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <div class="dashboard">

        <aside class="sidebar">
            <h2><a href="dashboard.html" class="logo">💻Dev Hub</a></h2>
            <ul>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="ideas.html">Ideas</a></li>
                <li><a href="settings.html">Settings</a></li>
            </ul>
        </aside>

        <main class="main-content">

            <header class="topbar">
                <h1>Dashboard</h1>
                <button class="logout-btn">Logout</button>
            </header>

            <section class="welcome">
                <h2>Welcome back 👋</h2>
                <p>Let’s build something today.</p>
            </section>
            
            <p id="current-date">Loading date...</p>


            <section class="cards">
                <div class="card">
                    <h3>Active Projects</h3>
                    <p>3 ongoing</p>
                </div>

                <div class="card">
                    <h3>Ideas Vault</h3>
                    <p>12 stored ideas</p>
                </div>

                <div class="card">
                    <h3>Bugs</h3>
                    <p>2 unresolved</p>
                </div>
            </section>

        </main>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
