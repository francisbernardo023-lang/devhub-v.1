<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="sign-up.css">
</head>
<body>
<div class="sign-up-container">
    <h2>Welcome! New User</h2>

    <form>
        <div class="input-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="Enter your email">
            <p id="email-error" style="color: red;" type="alert"></p>
        </div>

        <div class="input-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter your password">
    <p id="password-error" style="color: red;" type="alert"></p>
</div>

<div class="input-group">
    <label>Confirm Password</label>
    <input type="password" id="confirm-password" placeholder="Confirm your password">
    <p id="confirm-password-error" style="color: red;" type="alert"></p>
</div>

        <button type="submit" id="signup-button">Sign Up</button>
        <p class="login-link">
            Already have an account? <a href="log in.html">Log in</a>
        </p>
    </form>
</div>
<script src="sign-up.js"></script>

</body>
</html>
